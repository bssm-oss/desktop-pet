name: Bug Report
description: Something is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please fill in as much detail as possible so we can reproduce it quickly.

  - type: input
    id: version
    attributes:
      label: Desktop Pet version
      placeholder: "e.g. v1.0.0  (🐾 menu → Settings → version shown at bottom)"
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "e.g. macOS 14.5 Sonoma"
    validations:
      required: true

  - type: input
    id: chip
    attributes:
      label: Mac chip
      placeholder: "e.g. M1, M2 Pro, M3 Max"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open app
        2. Import a GIF
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: file_format
    attributes:
      label: File format (if relevant)
      placeholder: "e.g. GIF, APNG, MP4"

  - type: textarea
    id: logs
    attributes:
      label: Console logs (optional)
      description: |
        Run `log show --predicate 'process == "DesktopPet"' --last 5m` in Terminal and paste the output.
      render: shell
