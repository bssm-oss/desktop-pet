name: Build Windows

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate app icon
        shell: pwsh
        run: |
          magick `
            "DesktopPet/Assets.xcassets/AppIcon.appiconset/icon_16x16.png" `
            "DesktopPet/Assets.xcassets/AppIcon.appiconset/icon_32x32.png" `
            "DesktopPet/Assets.xcassets/AppIcon.appiconset/icon_128x128.png" `
            "DesktopPet/Assets.xcassets/AppIcon.appiconset/icon_256x256.png" `
            "DesktopPet.Windows/app.ico"

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja

      - name: Build
        shell: msys2 {0}
        run: |
          cd DesktopPet.Windows
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DINCLUDE_ICON=ON
          cmake --build build --config Release

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DAPP_VERSION=dev DesktopPet.Windows/installer.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopPet-Windows-Setup
          path: DesktopPet-Windows-Setup.exe
