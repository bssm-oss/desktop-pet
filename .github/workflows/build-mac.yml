name: Build macOS

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build DesktopPet.app
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Print Swift and SDK version
        run: |
          swift --version
          xcrun --sdk macosx --show-sdk-path

      - name: Build with swiftc
        run: |
          set -euo pipefail

          SDK=$(xcrun --sdk macosx --show-sdk-path)
          APP="$PWD/build/DesktopPet.app"
          BIN="$APP/Contents/MacOS"
          RES="$APP/Contents/Resources"

          mkdir -p "$BIN" "$RES"

          swiftc \
            -sdk "$SDK" \
            -target arm64-apple-macosx14.0 \
            -O \
            -framework AppKit \
            -framework AVFoundation \
            -framework CoreGraphics \
            -framework CoreServices \
            -framework ServiceManagement \
            DesktopPet/App/main.swift \
            DesktopPet/App/AppDelegate.swift \
            DesktopPet/Settings/AppSettings.swift \
            DesktopPet/Settings/SettingsView.swift \
            DesktopPet/Playback/FrameSequence.swift \
            DesktopPet/Playback/GIFDecoder.swift \
            DesktopPet/Playback/APNGDecoder.swift \
            DesktopPet/Playback/PNGSequenceDecoder.swift \
            DesktopPet/Playback/AnimationPlayer.swift \
            DesktopPet/Playback/VideoPlayer.swift \
            DesktopPet/Utilities/PlaceholderAnimation.swift \
            DesktopPet/Utilities/SecurityScopedAccess.swift \
            DesktopPet/Window/OverlayWindow.swift \
            DesktopPet/Window/PetView.swift \
            DesktopPet/Window/OverlayWindowController.swift \
            DesktopPet/MenuBar/MenuBarController.swift \
            -o "$BIN/DesktopPet"

          cp DesktopPet/App/Info.plist "$APP/Contents/Info.plist"
          printf 'APPL????' > "$APP/Contents/PkgInfo"

          xcrun actool \
            --output-format human-readable-text \
            --notices --warnings \
            --platform macosx \
            --minimum-deployment-target 14.0 \
            --compile "$RES" \
            DesktopPet/Assets.xcassets \
          || true

          echo "=== Bundle contents ==="
          find "$APP" -type f | sort

      - name: Ad-hoc code sign
        run: |
          codesign --force --deep --sign - build/DesktopPet.app
          codesign --verify --verbose build/DesktopPet.app

      - name: Create DMG
        run: |
          mkdir -p build/dmg-stage
          cp -R build/DesktopPet.app build/dmg-stage/
          ln -s /Applications build/dmg-stage/Applications

          hdiutil create \
            -volname "Desktop Pet" \
            -srcfolder build/dmg-stage \
            -ov -format UDZO \
            build/DesktopPet.dmg

          ls -lh build/DesktopPet.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopPet-macOS
          path: build/DesktopPet.dmg
